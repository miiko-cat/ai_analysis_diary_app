name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - name: 依存関係のインストール
        run: flutter pub get

      - name: 環境変数ファイルを生成
        run: |
          cat > dart_defines/.env.ci << EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY=${{ secrets.SUPABASE_API_KEY }}
          SENTRY_FLUTTER_DSN=${{ secrets.SENTRY_FLUTTER_DSN }}
          SENTRY_ENVIRONMENT=${{ vars.SENTRY_ENVIRONMENT }}
          EOF

      - name: ビルド確認
        run: flutter build apk --dart-define=env=dart_defines/.env.ci --flavor=prod

      - name: テスト実行
        run: flutter test